<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Iniciar Sesión</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: rgba(18, 18, 18, 0.85);
            --border-color: #262626;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --accent: #ffffff; /* Estilo minimalista, botones e indicaciones en blanco puro */
            --error: #ef4444;
        }

    body {
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg-dark);
    margin: 0;
    
    /* --- CAMBIO: Añadimos un 10% de espacio a la derecha para que no toque el borde --- */
    padding: 0 10% 0 0; 
    
    display: flex;
    
    /* --- CAMBIO CRUCIAL: De 'center' pasamos a 'flex-end' para empujar a la derecha --- */
    justify-content: flex-end; 
    
    align-items: center;
    min-height: 100vh;
    color: var(--text-main);
    
    background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                url('mi-fondo.png') no-repeat center center;
    background-size: cover;
    }

        .login-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            border-radius: 4px; /* Bordes rectos y limpios tipo streetwear */
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            box-sizing: border-box;
            text-align: center;
        }

        .logo-box {
            margin-bottom: 40px;
        }

        /* Contenedor del Logo */
        .logo-box img {
            max-width: 180px;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .logo-fallback {
            font-size: 1.6em;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 0.85em;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #171717;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 0.95em;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            background: #1f1f1f;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000000; /* Alto contraste: botón blanco, texto negro */
            border: none;
            border-radius: 4px;
            font-size: 0.9em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #e5e5e5;
        }

        .error-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 25px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-box">
        <img src="mi-logo.png" alt="LOGO" onerror="this.style.display='none'; document.getElementById('brand-text').style.display='block'">
        <h1 id="brand-text" class="logo-fallback" style="display: none;">PANEL CONTROL</h1>
        <div class="subtitle">AUTENTICACIÓN REQUERIDA</div>
    </div>

    <div id="error-container" class="error-alert"></div>

    <form id="login-form" onsubmit="procesarLogin(event)">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" class="input-field" placeholder="INGRESAR USUARIO" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">INGRESAR</button>
    </form>
</div>

<script>
    async function procesarLogin(event) {
        event.preventDefault();
        
        const usuario = document.getElementById('username').value;
        const contrasena = document.getElementById('password').value;
        const errorContainer = document.getElementById('error-container');
        
        errorContainer.style.display = 'none';

        try {
            // Llama directamente al endpoint que acabamos de meter en tu index.ts
            const respuesta = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, contrasena })
            });

            const resultado = await respuesta.json();

            if (respuesta.ok && resultado.success) {
                // Al ser correcto, te manda directo a la pantalla de arqueo
                // Puedes cambiar '/arqueo.html' por tu página de inicio si es otra
                window.location.href = '/index.html'; 
            } else {
                errorContainer.innerText = resultado.message || "ACCESO DENEGADO";
                errorContainer.style.display = 'block';
            }
        } catch (err) {
            errorContainer.innerText = "ERROR DE CONEXIÓN CON EL SERVIDOR LOCAL";
            errorContainer.style.display = 'block';
        }
    }
</script>
</body>
</html>
